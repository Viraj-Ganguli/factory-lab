services:
  db:
    image: postgres:16-alpine
    container_name: factory-lab-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: factorylab
      POSTGRES_PASSWORD: factorylab
      POSTGRES_DB: factorylab
    ports:
      - "5432:5432"
    volumes:
      - factory-lab-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factorylab -d factorylab"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  factory-lab-db-data:
